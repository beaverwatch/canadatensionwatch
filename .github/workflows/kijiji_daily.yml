name: 🦫 Kijiji Stress Index — Daily Update

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-kijiji:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4

      - name: 🦫 Run Kijiji Scraper
        run: python scripts/kijiji_scraper.py

      - name: 💾 Commit and push
        run: |
          git config --global user.name "Beaver Bot"
          git config --global user.email "beaver@beaver.watch"
          git add kijiji_data.json kijiji_baseline.json
          git diff --staged --quiet || git commit -m "🦫 Kijiji update $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
