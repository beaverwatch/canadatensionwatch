name: 🦫 BeaverWatch — Daily Data Update

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-all:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 pytrends

      - name: 🦫 Run Kijiji Scraper
        run: python scripts/kijiji_scraper.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 📈 Run Google Trends Scraper
        run: python scripts/google_trends_scraper.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 🚗 Run Auto Theft Scraper
        run: python scripts/auto_theft_scraper.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 💾 Commit and push
        run: |
          git config --global user.name "Beaver Bot 🦫"
          git config --global user.email "beaver@beaver.watch"
          git stash
          git pull origin main
          git stash pop
          git add kijiji_data.json kijiji_baseline.json kijiji_history.json trends_data.json auto_theft_data.json auto_theft_history.json
          git diff --staged --quiet || git commit -m "🦫 Daily update $(date +'%Y-%m-%d') — Kijiji + Trends + Claude"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
